<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>“Items List”</title>
</head>
<body>
    {% include 'header.html' %}
    <main>
        <h1>Items List</h1>
        {% if items %}
        <ul>
            {% for items in items %}
                <li>{{items}}</li>
            {% endfor %}
            {% else %}
            <li>No items found</li>
            {% endif %}
        </ul>
    </main>
    {% include 'footer.html' %}
</body>
</html>
