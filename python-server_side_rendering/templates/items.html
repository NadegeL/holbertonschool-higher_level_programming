<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>“Items List”</title>
    </head>
    <body>
        {% include 'header.html' %}
        <h1>Items List</h1>
        {% if items %}
        <ul>
            {% for items in items %}
                <li>{{items}}</li>
            {% endfor %}
        </ul>
        {% else %}
        <p>No items found</p>
        {% endif %}
        {% include 'footer.html' %}
    </body>
</html>
